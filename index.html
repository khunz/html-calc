<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="frame">
      <div class="display"></div>
      <div class="keypad">
        <div class="numpad">
          <div class="r1">
            <button id="num7">7</button>
            <button id="num8">8</button>
            <button id="num9">9</button>
          </div>

          <div class="r2">
            <button id="num4">4</button>
            <button id="num5">5</button>
            <button id="num6">6</button>
          </div>

          <div class="r3">
            <button id="num1">1</button>
            <button id="num2">2</button>
            <button id="num3">3</button>
          </div>

          <div class="r4">
            <button id="bottomLeftCorner">X</button>
            <button id="num0">0</button>
            <button id="bottomRightCorner">X</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
