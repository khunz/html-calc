<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <div class="frame">
      <div class="screen"></div>
      <div class="keypad">
        <div class="r1">
          <button id="clear">AC</button>
          <button id="r1c2">&nbsp;</button>
          <button id="r1c3">&nbsp;</button>
          <button class="operation" id="divide">÷</button>
        </div>

        <div class="r2">
          <button class="number" id="num7">7</button>
          <button class="number" id="num8">8</button>
          <button class="number" id="num9">9</button>
          <button class="operation" id="multiply">×</button>
        </div>

        <div class="r3">
          <button class="number" id="num4">4</button>
          <button class="number" id="num5">5</button>
          <button class="number" id="num6">6</button>
          <button class="operation" id="subtract">−</button>
        </div>

        <div class="r4">
          <button class="number" id="num1">1</button>
          <button class="number" id="num2">2</button>
          <button class="number" id="num3">3</button>
          <button class="operation" id="add">+</button>
        </div>

        <div class="r5">
          <button class="number" id="num0">0</button>
          <button class="number" id="decimal">·</button>
          <button id="equals">=</button>
        </div>
      </div>
    </div>
  </body>
</html>
